services:
    qobuz-dl:
        container_name: qobuz-dl
        build:
            context: .
            dockerfile: Dockerfile
        ports:
            - '${PORT:-3000}:3000'
        env_file: .env
        volumes:
            - /tmp/uds_check.sock:/tmp/uds_check.sock
        environment:
            - SOCKS5_PROXY=warp-socks:9091
            - WARP_ROTATOR_URL=http://warp-rotator:7070/rotate
            - APPLE_MUSIC_API_URL=http://apple-music-api:8000
        depends_on:
            warp-socks:
                condition: service_healthy
        restart: unless-stopped
        networks:
            - qobuz-network

    warp-socks:
        build:
            context: ./docker/warp-socks
            dockerfile: Dockerfile
        container_name: warp-socks
        privileged: true
        cap_add:
            - NET_ADMIN
            - SYS_MODULE
        sysctls:
            - net.ipv6.conf.all.disable_ipv6=0
            - net.ipv4.conf.all.src_valid_mark=1
        environment:
            - WARP_SOCKS_PORT=9091
        restart: unless-stopped
        networks:
            - qobuz-network

    # Rotaciona o IP do WARP via warp-cli disconnect/connect
    warp-rotator:
        image: docker:cli
        container_name: warp-rotator
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
            - ./scripts/rotate-ip.sh:/rotate-ip.sh:ro
        entrypoint: /bin/sh
        command: /rotate-ip.sh
        environment:
            - ROTATION_INTERVAL=${WARP_ROTATION_INTERVAL:-1800}
        depends_on:
            warp-socks:
                condition: service_healthy
        restart: unless-stopped
        networks:
            - qobuz-network

    # Apple Music sidecar — internal service (not exposed)
    apple-music-api:
        build:
            context: ./apple-music
            dockerfile: Dockerfile
        container_name: apple-music-api
        env_file: .env
        environment:
            - SOCKS5_PROXY=warp-socks:9091
            - APPLE_MUSIC_COOKIES_PATH=/app/cookies/cookies.txt
            - WRAPPER_HOST=apple-music-wrapper
            - WRAPPER_DECRYPT_PORT=10020
            - WRAPPER_M3U8_PORT=20020
            - WRAPPER_ACCOUNT_PORT=30020
            - APPLE_MUSIC_REQUEST_DELAY_MS=${APPLE_MUSIC_REQUEST_DELAY_MS:-500}
            - APPLE_MUSIC_MAX_RETRIES_429=${APPLE_MUSIC_MAX_RETRIES_429:-5}
            - APPLE_MUSIC_MAX_CONCURRENT_DOWNLOADS=${APPLE_MUSIC_MAX_CONCURRENT_DOWNLOADS:-2}
        volumes:
            - ./apple-music/cookies:/app/cookies:ro
        depends_on:
            warp-socks:
                condition: service_healthy
            apple-music-wrapper:
                condition: service_healthy
        restart: unless-stopped
        networks:
            - qobuz-network

    # Apple Music Wrapper — decrypts ALAC/lossless via Apple's native libraries
    apple-music-wrapper:
        build:
            context: ./docker/apple-music-wrapper
            dockerfile: Dockerfile
        container_name: apple-music-wrapper
        privileged: true
        entrypoint: ./wrapper
        command: ["-H", "0.0.0.0"]
        volumes:
            - ./apple-music/wrapper-data:/app/rootfs/data
        healthcheck:
            test: ["CMD", "curl", "-sf", "http://127.0.0.1:30020/"]
            interval: 5s
            timeout: 3s
            retries: 60
            start_period: 30s
        restart: unless-stopped
        networks:
            - qobuz-network

networks:
    qobuz-network:
        driver: bridge
