services:
    qobuz-dl:
        container_name: qobuz-dl
        build:
            context: .
            dockerfile: Dockerfile
        ports:
            - '${PORT:-3000}:3000'
        env_file: .env
        volumes:
            - /tmp/uds_check.sock:/tmp/uds_check.sock
        environment:
            - SOCKS5_PROXY=warp-socks:9091
            - WARP_ROTATOR_URL=http://warp-rotator:7070/rotate
        depends_on:
            warp-socks:
                condition: service_healthy
        restart: unless-stopped
        networks:
            - qobuz-network

    warp-socks:
        build:
            context: ./docker/warp-socks
            dockerfile: Dockerfile
        container_name: warp-socks
        privileged: true
        cap_add:
            - NET_ADMIN
            - SYS_MODULE
        sysctls:
            - net.ipv6.conf.all.disable_ipv6=0
            - net.ipv4.conf.all.src_valid_mark=1
        environment:
            - WARP_SOCKS_PORT=9091
        restart: unless-stopped
        networks:
            - qobuz-network

    # Rotaciona o IP do WARP via warp-cli disconnect/connect
    warp-rotator:
        image: docker:cli
        container_name: warp-rotator
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
            - ./scripts/rotate-ip.sh:/rotate-ip.sh:ro
        entrypoint: /bin/sh
        command: /rotate-ip.sh
        environment:
            - ROTATION_INTERVAL=${WARP_ROTATION_INTERVAL:-1800}
        depends_on:
            warp-socks:
                condition: service_healthy
        restart: unless-stopped
        networks:
            - qobuz-network

networks:
    qobuz-network:
        driver: bridge
